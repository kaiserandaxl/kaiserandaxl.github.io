<!-- HTML -->
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,
    initial-scale=1.0"/>

  <link type="text/css" rel="stylesheet" href="./src/Styles/Style.css"/>
</head>

<body>
  <div class="Taskbar">
    <label id="Total" class="Total">$0.00</label>
    <button id="Clear" class="Clear">Clear</button>

    <button id="Reset" class="Reset">Reset</button>
    <label id="Change" class="Change">$0.00</label>
  </div>


  <div class="Calculator">
    <div class="CalcDisplay">
      <label id="Calculator" class="CalcNum">0</label>
    </div>

    <div class="Numbers">
      <button name="CalcButton" class="Number">0.5</button>
      <button name="CalcButton" class="Number">1</button>
      <button name="CalcButton" class="Number">5</button>
      <button name="CalcButton" class="Number">10</button>
      <button name="CalcButton" class="Number">20</button>
      <button name="CalcButton" class="Number">50</button>
    </div> 
  </div>

  <div id="History" class="History"></div>  

  <script type="module" src="./src/Scripts/Menu.js" type="text/javascript"></script>
  <script type="module" src="./src/Scripts/Script.js" type="text/javascript"></script>
</body>
