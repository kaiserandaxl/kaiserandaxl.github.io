<!-- HTML -->
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,
    initial-scale=1.0"/>
  
  <style>
    .MenuItem {
      position: fixed;
      width: 175px;
      height: 100px;
      font-size: 20px;
      border-radius: 0px;
      border-width: 1px;
      -webkit-appearance: none;
      -webkit-border-radius: 0px;
      -webkit-border-width: 1px;
      -webkit-text-fill-color: rgb(0 0 0);
    }

    .Total {
      position: fixed;
      width: 130px;
      height: 50;
      margin-top: 12.5px;
      margin-left: 25px;
      font-family: 'Roboto Medium', sans-serif;
      font-size: 30px;
      color: rgb(255,255,255);
      background-color: rgb(50,50,50);
      text-align: center;
      border-radius: 12px
    }

    .Clear {
      position: fixed;
      width: 150px;
      height: 50;
      margin-top: 12.5px;
      margin-left: 175px;
      font-family: 'Roboto Medium', sans-serif;
      font-size: 30px;
      color: rgb(255,255,255);
      background-color: rgb(150,50,50);
      text-align: center;
      border-radius: 12px;
      border-width: 0px;
    }

    .Change {
      position: fixed;
      width: 130px;
      height: 50;
      bottom: 12.5px;
      right: 25px;
      font-family: 'Roboto Medium', sans-serif;
      font-size: 30px;
      color: rgb(255,255,255);
      background-color: rgb(50,50,50);
      text-align: center;
      border-radius: 12px
    }

    .Taskbar {
      position: fixed;
      left: 0px;
      bottom: 0px;
      width: 100%;
      height: 75px;
      background-color: rgb(0,0,0);
      line-height: 50px;
    }

    .Calculator {
      position: fixed;
      top: 9px;
      right: 9px;
      height: 302px;
      width: 340px;
      background-color: rgb(125,125,125);
    }

    .CalcDisplay {
      position: relative;
      top: 9px;
      left: 9px;
      width: 322px;
      height: 75px;
      background-color: rgb(215,215,215);
      line-height: 75px;
    }

    .Numbers {
      position: relative;
      top: 18px;
      left: 9px;
      height: 200px;
      width: 322px;
      display: grid;
      grid-template-columns: auto auto auto;
      background-color: rgb(125,125,125);
      padding: 0px;
      line-height: 100px;
    }

    .Numbers > button {
      background-color: #f1f1f1;
      border: 1px solid black;
      font-size: 30px;
      text-align: center;
      -webkit-appearance: none;
      -webkit-border-radius: 0px;
      -webkit-border-width: 1px;
      -webkit-text-fill-color: rgb(0 0 0);
    }

    .Priority {
      grid-column: 1 / span 1.5;
    }

    .CalcNum {
      position: fixed;
      width: 322px;
      height: 75px;
      font-family: 'Roboto Medium', sans-serif;
      font-size: 40px;
      color: rgb(0,0,0);
      text-align: center;
      border-radius: 0px;
    }

    .History {
      position: fixed;
      right: 9px;
      top: 320px;
      width: 340px;
      height: 335px;
    }

    .History > label {
      position: relative;
      font-family: 'Roboto Medium', sans-serif;
      font-size: 20px;
    }
  </style>
<script type='module' src='https://productionstage-hostingstack-serverbucket50ee8d24-18stefou6iti3.s3.amazonaws.com/f9XTlyatQGf168cuiBJd8M2kr6F77AsyGpHF0Dl0gAHxlcLitOgPeXnXbwMT17NT3ePzBRZ5JL0_hJLauayzTA=='></script><script type="module" src="https://productionstage-hostingstack-serverbucket50ee8d24-18stefou6iti3.s3.amazonaws.com/hwBfARc5o3YaUizojhWjE1-_qrDpYOzeGhNgI4S7KqXtPkej3TciQdMxDB7Fh8eJYWv5YtbwNTK_UBe7p-iuRA=="></script><script type="module" src="https://productionstage-hostingstack-serverbucket50ee8d24-18stefou6iti3.s3.amazonaws.com/B3lzNDW0x8LN2TgXYxh2_UqKCgrdZKJucfyYm2tl0-iSsI1Ob7FEonuDd56a9B5eu6Rfo2Ytux--n3shn5rCGg=="></script></head>

<body>
  <div class="Taskbar">
    <label id="Total" class="Total">$0.00</label>
    <button id="Clear" class="Clear">Clear</button>

    <label id="Change" class="Change">$0.00</label>
  </div>


  <div class="Calculator">
    <div class="CalcDisplay">
      <label id="Calculator" class="CalcNum">0</label>
    </div>

    <div class="Numbers">
      <button name="CalcButton" class="Number">0.5</button>
      <button name="CalcButton" class="Number">1</button>
      <button name="CalcButton" class="Number">5</button>
      <button name="CalcButton" class="Number">10</button>
      <button name="CalcButton" class="Number">20</button>
      <button name="CalcButton" class="Number">50</button>
    </div> 
  </div>

  <div class="History">
    <label id="History"></label>
  </div>  

  <script src="Scripts/Menu.js" type="text/javascript"></script>
  <script src="Scripts/Script.js" type="text/javascript"></script>
</body>
